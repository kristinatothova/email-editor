<!DOCTYPE html>

    <meta charset="UTF-8">

    <style>
        :root { --bg: #1e1e1e; --panel: #2d2d2d; --accent-arial: #4ade80; --accent-helvetica: #3b82f6; --text: #d4d4d4; --laba-blue: #0051ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 280px; background: var(--panel); border-right: 1px solid #444; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #333; font-weight: bold; border-bottom: 1px solid #444; text-align: center; }
        .template-list { flex: 1; overflow-y: auto; padding: 10px; }
        .template-item { padding: 10px; background: #3d3d3d; margin-bottom: 5px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .template-item:hover { background: #4d4d4d; }
        .template-item.active { background: #323e52; border-left: 4px solid var(--laba-blue); }

        /* Main View */
        #main-view { flex: 1; display: flex; flex-direction: column; }
        .toolbar { padding: 10px; background: #333; border-bottom: 1px solid #444; display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
        
        /* Editor Area */
       #visual-container { flex: 1; background-color: #F0F2F5; overflow-y: auto; padding: 40px; display: flex; justify-content: center; align-items: flex-start; }
       #editor-surface { width: 600px; min-height: auto; background: white; box-shadow: 0 5px 20px rgba(0,0,0,0.2); outline: none; color: #000; padding: 0 !important; margin: 0 auto; }

        /* Code View */
        #code-container { width: 350px; background: var(--panel); border-left: 1px solid #444; display: flex; flex-direction: column; }
        textarea { flex: 1; background: #161616; color: #85d7ff; padding: 10px; font-family: monospace; font-size: 10px; border: none; resize: none; }

        /* Buttons */
        .btn-tool { background: #444; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .btn-tool:hover { background: #555; }
        .btn-export { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .btn-arial { background: var(--accent-arial); color: #000; }
        .btn-helvetica { background: var(--accent-helvetica); color: #fff; }
        .separator { width: 1px; height: 20px; background: #555; margin: 0 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">ŠABLÓNY</div>
    <div class="template-list" id="tpl-list"></div>
</div>

<div id="main-view">
    <div class="toolbar">
        <button class="btn-tool" onclick="exec('bold')" title="Tučné"><b>B</b></button>
        <button class="btn-tool" onclick="exec('underline')" title="Podčiarknuté"><u>U</u></button>
        <button class="btn-tool" onclick="addLink()" title="Vložiť link">🔗 Link</button>
        <button class="btn-tool" onclick="exec('unlink')" title="Zrušiť link">🚫</button>
        
        <div class="separator"></div>
        
        <button class="btn-export btn-arial" onclick="exportMail('Arial, sans-serif')">EXPORT ARIAL</button>
        <button class="btn-export btn-helvetica" onclick="exportMail('Helvetica, Arial, sans-serif')">EXPORT HELVETICA</button>
        
        <span id="active-tpl-name" style="margin-left: auto; font-size: 11px; color: #888;"></span>
    </div>
    
    <div id="visual-container">
        <div id="editor-surface" contenteditable="true" spellcheck="false"></div>
    </div>
</div>

<div id="code-container">

 <p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">→ živé lekce a jejich záznamy,→ všechny studijní materiály,→ praktické úkoly a zpětnou vazbu,→ chat s lektorem i ostatními studenty.</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><a target="_blank" style="mso-line-height-rule:exactly;text-decoration:underline;color:#333333;font-size:18px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif" href="">➡️ <strong style="font-weight:700 !important">Otevřít</strong><u> </u><strong style="font-weight:700 !important"><u>průvodce studiem</u></strong></a>&nbsp;</p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><br></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><strong style="font-weight:700 !important">🎥 Lekce na Zoomu</strong></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Zoom je přímo součástí LMS, takže ho nemusíš stahovat. Stačí před začátkem hodiny kliknout na <strong style="font-weight:700 !important">Lekce na Zoomu</strong>.</p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Odkaz na všechny lekce je pokaždé stejný a najdeš ho i v kalendáři. Koordinátoři ti ho navíc připomenou ve skupinovém chatu hodinu před lekcí.&nbsp;</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><a target="_blank" style="mso-line-height-rule:exactly;text-decoration:underline;color:#333333;font-size:18px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif" href="">➡️ <strong style="font-weight:700 !important">Otevřít lekci na Zoomu</strong></a></p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><br></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">📂 <strong style="font-weight:700 !important">Materiály ke kurzu</strong></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">V den lekce v LMS najdeš:</p><ul style="font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;padding:0px 0px 0px 40px;margin-top:15px;margin-bottom:15px"> 
<li style="color:#333333;margin:0px 0px 15px;font-size:18px;line-height:14.4px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif"><p style="Margin:0;mso-line-height-rule:exactly;mso-margin-bottom-alt:15px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:14.4px;letter-spacing:0;color:#333333;font-size:18px;mso-margin-top-alt:15px;text-align:left">odkaz na Zoom,</p></li> <li style="color:#333333;margin:0px 0px 15px;font-size:18px;line-height:14.4px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif"><p style="Margin:0;mso-line-height-rule:exactly;mso-margin-bottom-alt:15px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:14.4px;letter-spacing:0;color:#333333;font-size:18px;text-align:left">prezentaci,</p></li> 
<li style="color:#333333;margin:0px 0px 15px;font-size:18px;line-height:14.4px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif"><p style="Margin:0;mso-line-height-rule:exactly;mso-margin-bottom-alt:15px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:14.4px;letter-spacing:0;color:#333333;font-size:18px;text-align:left">případně úkoly nebo další materiály.</p></li> </ul><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Záznam z každé lekce bude k dispozici v needitované verzi už pár hodin po skončení v sekci <strong style="font-weight:700 !important">Odkaz na Zoom</strong>.</p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Finální verzi v plné kvalitě přidáme do sekce <strong style="font-weight:700 !important">Záznam lekce </strong>následující den.</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><br></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><strong style="font-weight:700 !important">💬 Komunikace v LMS</strong></p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><strong style="font-weight:700 !important">👥 Komunita</strong></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Společný chat pro všechny studenty, lektory i náš tým. Je to místo pro sdílení dotazů, nápadů i inspirace.&nbsp;</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><strong style="font-weight:700 !important">📬 Inbox</strong></p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Soukromé zprávy, které posíláš konkrétnímu člověku.&nbsp;</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><strong style="font-weight:700 !important">📬 Soukromý chat s lektorem nebo lektorkou</strong></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Prostor jen pro tebe a lektora nebo lektorku. Můžeš tady řešit úkoly, otázky i feedback. Po skončení kurzu se chat automaticky smaže.</p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">⚙️ <strong style="font-weight:700 !important">Technický problém nebo dotaz</strong></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">V horní liště najdeš tlačítko <i>Technická podpora</i> – napiš nám a rádi ti pomůžeme.&nbsp;</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><br></p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">💡<strong style="font-weight:700 !important"> Zpětná vazba</strong></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">V průběhu kurzu tě čekají tři krátké dotazníky – <strong style="font-weight:700 !important">na začátku, v polovině </strong>a <strong style="font-weight:700 !important">na konci</strong>.</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Jsou povinné, ale krátké a důležité. Pomáhají nám kurz vyladit a tobě z něj vytěžit maximum. 💬✨</p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><br></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><strong style="font-weight:700 !important">📞 Kontakty</strong></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Pokud budeš mít před kurzem nebo v jeho průběhu jakékoli dotazy, napiš nám na 📩 e-mail nebo volej +420 790 285 029.</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><br></p>

    const editor = document.getElementById('editor-surface');
    const output = document.getElementById('html-output');

    // Inicializácia zoznamu
    function init() {
        TPLS.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'template-item';
            div.innerText = t.name;
            div.onclick = () => loadTpl(i, div);
            document.getElementById('tpl-list').appendChild(div);
        });
    }

  function loadTpl(idx, el) {
    // 1. Vložíme HTML kód do editora
    editor.innerHTML = TPLS[idx].html;
    
    // 2. Prejdeme všetky prvky a zapneme im editáciu
    // Toto odomkne hlavičky, bunky tabuliek aj obrázky
    const allElements = editor.querySelectorAll('*');
    allElements.forEach(node => {
        node.setAttribute('contenteditable', 'true');
        // Zabezpečíme, aby tabuľky nezalamovali kurzor divne
        if(node.tagName === 'TD' || node.tagName === 'TABLE') {
            node.style.cursor = 'text';
        }
    });

    // 3. Ostatné funkcie editora
    document.getElementById('active-tpl-name').innerText = TPLS[idx].name;
    document.querySelectorAll('.template-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    
    updateCode();
}
    function exec(cmd) { document.execCommand(cmd, false, null); updateCode(); }
    
    function addLink() {
        const url = prompt("Vložte URL adresu (napr. https://laba.sk):");
        if (url) { document.execCommand('createLink', false, url); updateCode(); }
    }

    function updateCode() { output.value = editor.innerHTML; }
    editor.addEventListener('input', updateCode);

    function exportMail(font) {
        let h = editor.innerHTML;
        // Vyčistenie bordelu a nastavenie fontu
        h = h.replace(/font-family:[^;"]*/g, "font-family:" + font);
        output.value = h;
        output.select();
        document.execCommand('copy');
        alert("✅ Skopírované s fontom " + (font.includes('Arial') ? 'Arial' : 'Helvetica'));
    }

    init();
</script>
