<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Email Editor</title>
    <style>
        :root { --bg: #1e1e1e; --panel: #2d2d2d; --accent: #4ade80; --text: #d4d4d4; --link-blue: #1f5fcf; }
        body { margin: 0; font-family: Arial, sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        
        #sidebar { width: 280px; background: var(--panel); border-right: 1px solid #444; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #333; font-weight: bold; border-bottom: 1px solid #444; text-align: center; }
        .template-list { flex: 1; overflow-y: auto; padding: 10px; }
        .template-item { padding: 10px; background: #3d3d3d; margin-bottom: 5px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .template-item:hover { background: #4d4d4d; }
        .template-item.active { background: #325244; border-left: 4px solid var(--accent); }

        #main-view { flex: 1; display: flex; flex-direction: column; position: relative; }
        .toolbar { padding: 10px; background: #333; border-bottom: 1px solid #444; display: flex; gap: 8px; align-items: center; }
        
        #visual-container { flex: 1; background-color: #F0F2F5; overflow-y: auto; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
        
        /* Editor bez okrajov, základ Arial */
        #editor-surface { 
            width: 600px; 
            min-height: 800px; 
            background: white; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); 
            outline: none; 
            color: #000; 
            padding: 0 !important; 
            margin: 0 auto; 
            font-family: Arial, sans-serif;
            line-height: 1.5; 
        }
        
        #editor-surface a { color: var(--link-blue) !important; text-decoration: underline; }

        #code-container { width: 350px; background: var(--panel); border-left: 1px solid #444; display: flex; flex-direction: column; }
        textarea { flex: 1; background: #161616; color: #85d7ff; padding: 10px; font-family: monospace; font-size: 10px; border: none; resize: none; }

        .btn-tool { background: #444; color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 12px; font-family: Arial; }
        .btn-export { background: var(--accent); color: #000; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .btn-clean { background: #f59e0b; color: #000; font-weight: bold; font-size: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">ŠABLÓNY (ARIAL)</div>
    <div id="tpl-list" class="template-list"></div>
</div>

<div id="main-view">
    <div class="toolbar">
        <button class="btn-tool" onclick="exec('bold')"><b>B</b></button>
        <button class="btn-tool" onclick="exec('underline')"><u>U</u></button>
        <button class="btn-tool" onclick="addLink()">🔗 Link</button>
        <div style="width:1px; height:20px; background:#555; margin:0 5px;"></div>
        <button class="btn-tool btn-clean" onclick="cleanSelection()">🧹 Clear saver</button>
        <div style="width:1px; height:20px; background:#555; margin:0 5px;"></div>
        <button class="btn-export" onclick="exportMail()">🚀 EXPORTOVAŤ KÓD</button>
        <button class="btn-tool" onclick="openHtmlModal()" style="background:#6d28d9; margin-left:10px;">⬆ Vložiť HTML</button>
    </div>

    <div id="html-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:#2d2d2d; border:1px solid #555; border-radius:8px; width:800px; max-width:95vw; display:flex; flex-direction:column;">
            <div style="padding:15px; background:#252525; color:white; font-weight:bold;">Vložiť zdrojový kód</div>
            <textarea id="html-import-area" style="height:450px; background:#161616; color:#85d7ff; padding:15px; font-family:monospace; border:none; outline:none;"></textarea>
            <div style="padding:15px; background:#252525; display:flex; gap:10px; justify-content:flex-end;">
                <button onclick="applyHtml()" class="btn-tool" style="background:#6d28d9;">✅ POUŽIŤ</button>
            </div>
        </div>
    </div>

    <div id="visual-container">
        <div id="editor-surface" contenteditable="true" spellcheck="false"></div>
    </div>
</div>

<div id="code-container">
    <textarea id="html-output" readonly></textarea>
</div>

 <p style="Margin:0;mso-line-height-rule:exactly;font-family:arial, 'arial', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><a href="https://play.google.com/store/apps/details?id=com.laba_cz.school" style="mso-line-height-rule:exactly;text-decoration:none;color:#333333;font-size:18px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif"><u>👉 Google Play (Android)</u></a></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><br></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">📚 <strong style="font-weight:700 !important">V LMS najdeš:</strong></p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:arial, 'arial', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">→ živé lekce a jejich záznamy,→ všechny studijní materiály,→ praktické úkoly a zpětnou vazbu,→ chat s lektorem i ostatními studenty.</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><a target="_blank" style="mso-line-height-rule:exactly;text-decoration:underline;color:#333333;font-size:18px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif" href="">➡️ <strong style="font-weight:700 !important">Otevřít</strong><u> </u><strong style="font-weight:700 !important"><u>průvodce studiem</u></strong></a>&nbsp;</p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:arial, 'arial', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><br></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><strong style="font-weight:700 !important">🎥 Lekce na Zoomu</strong></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Zoom je přímo součástí LMS, takže ho nemusíš stahovat. Stačí před začátkem hodiny kliknout na <strong style="font-weight:700 !important">Lekce na Zoomu</strong>.</p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:arial, 'arial', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Odkaz na všechny lekce je pokaždé stejný a najdeš ho i v kalendáři. Koordinátoři ti ho navíc připomenou ve skupinovém chatu hodinu před lekcí.&nbsp;</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><a target="_blank" style="mso-line-height-rule:exactly;text-decoration:underline;color:#333333;font-size:18px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif" href="">➡️ <strong style="font-weight:700 !important">Otevřít lekci na Zoomu</strong></a></p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:arial, 'arial', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><br></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">📂 <strong style="font-weight:700 !important">Materiály ke kurzu</strong></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">V den lekce v LMS najdeš:</p><ul style="font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;padding:0px 0px 0px 40px;margin-top:15px;margin-bottom:15px"> 
<li style="color:#333333;margin:0px 0px 15px;font-size:18px;line-height:14.4px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif"><p style="Margin:0;mso-line-height-rule:exactly;mso-margin-bottom-alt:15px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:14.4px;letter-spacing:0;color:#333333;font-size:18px;mso-margin-top-alt:15px;text-align:left">odkaz na Zoom,</p></li> <li style="color:#333333;margin:0px 0px 15px;font-size:18px;line-height:14.4px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif"><p style="Margin:0;mso-line-height-rule:exactly;mso-margin-bottom-alt:15px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:14.4px;letter-spacing:0;color:#333333;font-size:18px;text-align:left">prezentaci,</p></li> 
<li style="color:#333333;margin:0px 0px 15px;font-size:18px;line-height:14.4px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif"><p style="Margin:0;mso-line-height-rule:exactly;mso-margin-bottom-alt:15px;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:14.4px;letter-spacing:0;color:#333333;font-size:18px;text-align:left">případně úkoly nebo další materiály.</p></li> </ul><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Záznam z každé lekce bude k dispozici v needitované verzi už pár hodin po skončení v sekci <strong style="font-weight:700 !important">Odkaz na Zoom</strong>.</p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:arial, 'arial', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Finální verzi v plné kvalitě přidáme do sekce <strong style="font-weight:700 !important">Záznam lekce </strong>následující den.</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><br></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><strong style="font-weight:700 !important">💬 Komunikace v LMS</strong></p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:arial, 'arial', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><strong style="font-weight:700 !important">👥 Komunita</strong></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Společný chat pro všechny studenty, lektory i náš tým. Je to místo pro sdílení dotazů, nápadů i inspirace.&nbsp;</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><strong style="font-weight:700 !important">📬 Inbox</strong></p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:arial, 'arial', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Soukromé zprávy, které posíláš konkrétnímu člověku.&nbsp;</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><strong style="font-weight:700 !important">📬 Soukromý chat s lektorem nebo lektorkou</strong></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Prostor jen pro tebe a lektora nebo lektorku. Můžeš tady řešit úkoly, otázky i feedback. Po skončení kurzu se chat automaticky smaže.</p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:arial, 'arial', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">⚙️ <strong style="font-weight:700 !important">Technický problém nebo dotaz</strong></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">V horní liště najdeš tlačítko <i>Technická podpora</i> – napiš nám a rádi ti pomůžeme.&nbsp;</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><br></p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:arial, 'arial', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">💡<strong style="font-weight:700 !important"> Zpětná vazba</strong></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">V průběhu kurzu tě čekají tři krátké dotazníky – <strong style="font-weight:700 !important">na začátku, v polovině </strong>a <strong style="font-weight:700 !important">na konci</strong>.</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Jsou povinné, ale krátké a důležité. Pomáhají nám kurz vyladit a tobě z něj vytěžit maximum. 💬✨</p>
 <p style="Margin:0;mso-line-height-rule:exactly;font-family:arial, 'v', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><br></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><strong style="font-weight:700 !important">📞 Kontakty</strong></p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px">Pokud budeš mít před kurzem nebo v jeho průběhu jakékoli dotazy, napiš nám na 📩 e-mail nebo volej +420 790 285 029.</p><p style="Margin:0;mso-line-height-rule:exactly;font-family:helvetica, 'helvetica neue', arial, verdana, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px"><br></p>

    function init() {
        TPLS.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'template-item';
            div.innerText = t.name;
            div.onclick = () => { 
                editor.innerHTML = t.html; 
                applyStyles(editor); 
                updateCode(); 
                document.querySelectorAll('.template-item').forEach(x => x.classList.remove('active'));
                div.classList.add('active');
            };
            document.getElementById('tpl-list').appendChild(div);
        });
    }

    function applyStyles(parent) {
        parent.querySelectorAll('*').forEach(node => {
            node.setAttribute('contenteditable', 'true');
            // Výnimka pre pätu - ak je to v kontajneri s 11px alebo obsahuje Copyright, nesiahame na to
            const isSmall = node.style.fontSize === '11px' || node.classList.contains('footer-copyright') || node.closest('.footer-copyright');
            
            if (!isSmall && node.tagName !== 'A' && node.tagName !== 'IMG') {
                node.style.fontFamily = 'Arial, sans-serif';
                // Hlavný text nastavíme na 13pt, ak už nemá iný špecifický štýl zo šablóny
                if (!node.style.fontSize) node.style.fontSize = '13pt';
            }
        });
    }

    function exec(cmd) { document.execCommand(cmd, false, null); updateCode(); }
    function addLink() {
        const url = prompt("URL:");
        if (url) { 
            document.execCommand('createLink', false, url); 
            const sel = window.getSelection();
            let a = sel.anchorNode.parentElement;
            if (a.tagName !== 'A') a = a.closest('a');
            if (a) { a.style.color = '#1f5fcf'; a.style.textDecoration = 'underline'; }
            updateCode(); 
        }
    }
    function cleanSelection() { document.execCommand('removeFormat', false, null); updateCode(); }
    function updateCode() { output.value = editor.innerHTML; }
    editor.addEventListener('input', updateCode);
    
    function exportMail() { 
        navigator.clipboard.writeText(editor.innerHTML).then(() => alert("Kód skopírovaný v Ariali!")); 
    }
    
    function openHtmlModal() { document.getElementById('html-import-area').value = ''; document.getElementById('html-modal').style.display = 'flex'; }
    function applyHtml() {
        editor.innerHTML = document.getElementById('html-import-area').value;
        applyStyles(editor);
        updateCode();
        document.getElementById('html-modal').style.display = 'none';
    }

    init();
</script>
