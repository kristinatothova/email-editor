<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>LABA / SKVOT Email Editor PRO</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --panel: #252525;
            --border: #3a3a3a;
            --text: #d4d4d4;
            --text-dim: #777;
            --green: #4ade80;
            --orange: #f59e0b;
            --purple: #7c3aed;
            --blue: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; font-size: 13px; }

        /* SIDEBAR */
        #sidebar { width: 220px; min-width: 220px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #sidebar-title { padding: 13px 14px; background: #1a1a1a; font-weight: 700; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; border-bottom: 1px solid var(--border); color: var(--green); display: flex; align-items: center; gap: 8px; }
        #tpl-list { flex: 1; overflow-y: auto; padding: 6px; }
        .tpl-item { padding: 11px 14px; background: #2e2e2e; margin-bottom: 3px; border-radius: 5px; cursor: pointer; font-size: 12px; border-left: 3px solid transparent; color: #bbb; transition: all 0.15s; user-select: none; }
        .tpl-item:hover { background: #383838; color: #fff; border-left-color: #555; }
        .tpl-item.active { background: #1a3326; border-left-color: var(--green); color: #fff; font-weight: 600; }

        /* MAIN */
        #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        /* TOOLBAR */
        #toolbar { padding: 6px 10px; background: #222; border-bottom: 1px solid var(--border); display: flex; gap: 4px; align-items: center; flex-shrink: 0; flex-wrap: nowrap; overflow: hidden; }
        .sep { width: 1px; height: 20px; background: #444; margin: 0 2px; flex-shrink: 0; }
        .btn { border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: Arial, sans-serif; font-weight: 700; letter-spacing: 0.3px; transition: filter 0.1s; white-space: nowrap; flex-shrink: 0; }
        .btn:hover { filter: brightness(1.2); }
        .btn:active { filter: brightness(0.9); }
        .btn-dark { background: #3a3a3a; color: #ccc; }
        .btn-green { background: var(--green); color: #000; }
        .btn-orange { background: var(--orange); color: #000; }
        .btn-purple { background: var(--purple); color: #fff; }
        .btn-blue { background: var(--blue); color: #fff; }
        #tpl-name-display { font-size: 11px; color: var(--text-dim); margin-left: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* CANVAS */
        #canvas-wrap { flex: 1; background: #d8dadd; overflow-y: auto; padding: 24px 16px; display: flex; justify-content: center; align-items: flex-start; }
        #editor { width: 600px; min-height: 500px; background: #fff; box-shadow: 0 2px 20px rgba(0,0,0,0.3); outline: none; color: #000; font-family: Arial, sans-serif; }
        #editor a { color: #1a56c4 !important; }
        #editor td, #editor table { cursor: text; }
        /* Ensure empty <p><br></p> spacers from Google Docs remain visible */
        #editor p { margin: 0; min-height: 27px; line-height: 27px; }
        #editor p br:only-child { display: block; }
        /* Ensure bullet lists have proper left padding and never stick to the edge */
        #editor ul, #editor ol { padding: 0 0 0 40px; margin: 15px 0; }
        #editor li { margin-bottom: 15px; }

        /* CODE PANEL */
        #code-panel { width: 320px; min-width: 320px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        #code-title { padding: 10px 14px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; background: #1a1a1a; border-bottom: 1px solid var(--border); color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
        #code-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }
        #html-out { flex: 1; background: #0d0d0d; color: #7dd3fc; padding: 10px; font-family: 'Consolas', 'Courier New', monospace; font-size: 10px; border: none; resize: none; line-height: 1.5; outline: none; }

        /* TOAST */
        #toast { position: fixed; bottom: 20px; right: 20px; background: #22c55e; color: #fff; padding: 9px 18px; border-radius: 6px; font-size: 12px; font-weight: 700; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        #toast.show { opacity: 1; }

        /* DRAG-DROP OVERLAY */
        #drop-overlay { display: none; position: fixed; inset: 0; background: rgba(59,130,246,0.85); z-index: 999; align-items: center; justify-content: center; }
        #drop-overlay.active { display: flex; }
        #drop-overlay-inner { background: rgba(0,0,0,0.4); border: 3px dashed #fff; border-radius: 16px; padding: 50px 80px; text-align: center; color: #fff; font-size: 22px; font-weight: 700; pointer-events: none; }

        /* MODAL */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        #modal-box { background: #252525; border: 1px solid #444; border-radius: 8px; width: 760px; max-width: 95vw; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.7); }
        #modal-head { padding: 14px 18px; background: #1a1a1a; font-size: 12px; font-weight: 700; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
        #modal-close { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; line-height: 1; padding: 0 4px; }
        #modal-hint { padding: 8px 18px; font-size: 11px; color: #555; background: #1a1a1a; border-bottom: 1px solid #333; }
        #modal-area { height: 400px; background: #0d0d0d; color: #7dd3fc; padding: 14px; font-family: 'Consolas', monospace; font-size: 11px; border: none; resize: none; outline: none; }
        #modal-foot { padding: 10px 16px; background: #1a1a1a; border-top: 1px solid #444; display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
        #modal-chars { font-size: 11px; color: #444; margin-right: auto; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-title">📧 Email Templaty</div>
    <div id="tpl-list"></div>
</div>

<div id="main">
    <div id="toolbar">
        <button class="btn btn-dark" onclick="fmt('bold')"><b>B</b></button>
        <button class="btn btn-dark" onclick="fmt('italic')"><i>I</i></button>
        <button class="btn btn-dark" onclick="fmt('underline')"><u>U</u></button>
        <button class="btn btn-dark" onclick="doLink()">🔗 LINK</button>
        <button class="btn btn-dark" onclick="doUnlink()">✂ UNLINK</button>
        <div class="sep"></div>
        <span style="font-size:10px;color:#666;">↕</span>
        <select id="lh-sel" onchange="applyLineHeight(this.value)" title="Riadkovanie" style="background:#3a3a3a;color:#ccc;border:none;border-radius:4px;padding:3px 4px;font-size:11px;cursor:pointer;width:52px;">
            <option value="">LH</option>
            <option value="1.2">1.2</option>
            <option value="1.4">1.4</option>
            <option value="1.5">1.5</option>
            <option value="1.6">1.6</option>
            <option value="1.8">1.8</option>
            <option value="2.0">2.0</option>
        </select>
        <span style="font-size:10px;color:#666;">⬇</span>
        <select id="mb-sel" onchange="applyMarginBottom(this.value)" title="Medzera pod odsekom" style="background:#3a3a3a;color:#ccc;border:none;border-radius:4px;padding:3px 4px;font-size:11px;cursor:pointer;width:60px;">
            <option value="">MB</option>
            <option value="0px">0px</option>
            <option value="6px">6px</option>
            <option value="10px">10px</option>
            <option value="14px">14px</option>
            <option value="20px">20px</option>
            <option value="30px">30px</option>
        </select>
        <div class="sep"></div>
        <button class="btn btn-orange" onclick="cleanSel()">🧹 CLEAR SAVER</button>
        <button class="btn btn-purple" onclick="openModal()">⬆ VLOŽIŤ HTML</button>
        <button class="btn btn-blue" onclick="triggerImport()">📂 IMPORT GDOC</button>
        <input type="file" id="file-import" accept=".html,.htm" style="display:none" onchange="handleFileImport(this)">
        <div class="sep"></div>
        <button class="btn btn-green" onclick="doExport()">🚀 EXPORT KÓD</button>
        <span id="tpl-name-display"></span>
    </div>
    <div id="canvas-wrap">
        <div id="editor" contenteditable="true" spellcheck="false"></div>
    </div>
</div>

<div id="code-panel">
    <div id="code-title"><span id="code-dot"></span>HTML OUTPUT</div>
    <textarea id="html-out" readonly placeholder="Klikni na šablónu v ľavom paneli..."></textarea>
</div>

<div id="toast"></div>

<div id="drop-overlay">
    <div id="drop-overlay-inner">📂 Pusť HTML soubor z Google Docs sem</div>
</div>

<div id="modal">
    <div id="modal-box">
        <div id="modal-head">
            <span>⬆ VLOŽIŤ / AKTUALIZOVAŤ HTML KÓD</span>
            <button id="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div id="modal-hint">Vlož HTML kód — nahradí obsah editora. Formátovanie sa automaticky vyčistí pri exporte.</div>
        <textarea id="modal-area" placeholder="Tu vlož HTML kód..."></textarea>
        <div id="modal-foot">
            <span id="modal-chars"></span>
            <button class="btn btn-dark" onclick="closeModal()">ZRUŠIŤ</button>
            <button class="btn btn-purple" onclick="applyModal()">✅ POUŽIŤ HTML</button>
        </div>
    </div>
</div>

;margin-top:12px;mso-margin-bottom-alt:4px;margin-bottom:4px;\">➡️ <strong style=\"font-weight:700 !important;\">Otevřít kurz v LMS</strong></p>\n<p style=\"Margin:0;mso-line-height-rule:exactly;font-family:Arial, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px;mso-margin-bottom-alt:10px;margin-bottom:10px;\">Datum a čas lekce najdeš vždy ve virtuální učebně Labaverse. Taky ti posíláme <strong style=\"font-weight:700 !important;\">Google kalendář</strong> se všemi termíny – stačí kliknout na odkaz a přidat si ho. Nebo použij odkaz na <a href=\"https://calendar.google.com/calendar/ical/c_e45d8bbefe92e1d7ff3db59fcb28a08bb0f4486828315c750642103c400f499e%40group.calendar.google.com/public/basic.ics\" target=\"_blank\" style=\"mso-line-height-rule:exactly;color:#1a56c4;font-size:18px;font-family:Arial, sans-serif;text-decoration:underline;\">icalendar</a>, pokud preferuješ jiný kalendář. V každé události pak najdeš stejný odkaz na Zoom.</p>\n\n<p style=\"Margin:0;mso-line-height-rule:exactly;font-family:Arial, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px;mso-margin-top-alt:12px;margin-top:12px;mso-margin-bottom-alt:4px;margin-bottom:4px;\"><strong style=\"font-weight:700 !important;\">💻 Kde kurz probíhá?</strong></p>\n<p style=\"Margin:0;mso-line-height-rule:exactly;font-family:Arial, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px;mso-margin-bottom-alt:10px;margin-bottom:10px;\">Kurz poběží v naší virtuální učebně Labaverse, kterou můžeš spustit na <a href=\"https://learn.l-a-b-a.cz/\" target=\"_blank\" style=\"mso-line-height-rule:exactly;color:#1a56c4;font-size:18px;font-family:Arial, sans-serif;text-decoration:underline;\">webu</a> i v mobilní aplikaci pro Android a iOS.</p>\n\n<p style=\"Margin:0;mso-line-height-rule:exactly;font-family:Arial, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px;mso-margin-top-alt:12px;margin-top:12px;mso-margin-bottom-alt:4px;margi 18px;font-family:Arial, sans-serif;text-decoration:underline;\">➡️ <strong style=\"font-weight:700 !important;\">Otevřít průvodce studiem</strong></a></p>\n\n<p style=\"Margin:0;mso-line-height-rule:exactly;font-family:Arial, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px;mso-margin-top-alt:12px;margin-top:12px;mso-margin-bottom-alt:4px;margin-bottom:4px;\"><strong style=\"font-weight:700 !important;\">🎥 Lekce na Zoomu</strong></p>\n<p style=\"Margin:0;mso-line-height-rule:exactly;font-family:Arial, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px;mso-margin-bottom-alt:10px;margin-bottom:10px;\">Zoom je přímo součástí LMS, takže ho nemusíš stahovat. Stačí před začátkem hodiny kliknout na <strong style=\"font-weight:700 !important;\">Lekce na Zoomu</strong>.</p>\n<p style=\"Margin:0;mso-line-height-rule:exactly;font-family:Arial, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px;mso-margin-bottom-alt:10px;margin-bottom:10px;\">Odkaz na všechny lekce je pokaždé stejný a najdeš ho i v kalendáři. Koordinátoři ti ho navíc připomenou ve skupinovém chatu hodinu před lekcí.</p>\n<p style=\"Margin:0;mso-line-height-rule:exactly;font-family:Arial, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px;mso-margin-bottom-alt:10px;margin-bottom:10px;\"><a href=\"\" target=\"_blank\" style=\"mso-line-height-rule:exactly;color:#1a56c4;font-size:18px;font-family:Arial, sans-serif;text-decoration:underline;\">➡️ <strong style=\"font-weight:700 !important;\">Otevřít lekci na Zoomu</strong></a></p>\n\n<p style=\"Margin:0;mso-line-height-rule:exactly;font-family:Arial, sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px;mso-margin-top-alt:12px;margin-top:12px;mso-margin-bottom-alt:4px;margin-bottom:4px;\">📂 <strong style=\"font-weight:700 !important;\">Materiály ke kurzu</strong></p>\n<p style=\"Margin:0;mso-line-height-rule:exactly;font-family:Arial, sans-serif;line-hei             while (el.firstChild) parent.insertBefore(el.firstChild, el);
            parent.removeChild(el);
        }
    });

    // Step 3: WHITELIST style stripper.
    // Nukes the entire style attribute and re-applies ONLY bold/italic/underline.
    // This handles any remaining CSS Google Docs / Safari / Word can invent.
    function strip(n) {
        if (n.nodeType !== 1) return;
        const tag = n.tagName;
        const s = n.style;

        // Save meaningful formatting before nuking
        const isBold      = s.fontWeight === 'bold' || parseInt(s.fontWeight) >= 600;
        const isItalic    = s.fontStyle === 'italic';
        const isUnderline = s.textDecoration && s.textDecoration.includes('underline');

        // Nuke ALL inline styles
        n.removeAttribute('style');

        // Re-apply only the ones that matter
        if (isBold)      s.fontWeight     = 'bold';
        if (isItalic)    s.fontStyle      = 'italic';
        if (isUnderline) s.textDecoration = 'underline';

        // Links: always set blue color + underline so they're visible
        if (tag === 'A' && n.getAttribute('href')) {
            n.style.color = '#1a56c4';
            n.style.textDecoration = 'underline';
            n.style.fontSize = '18px';
            n.style.fontFamily = 'Arial, sans-serif';
            n.setAttribute('target', '_blank');
        }

        // Clean junk attributes
        const id = n.getAttribute('id') || '';
        if (id.startsWith('docs-internal-guid')) n.removeAttribute('id');
        Array.from(n.attributes).forEach(a => {
            if (a.name.startsWith('data-') || a.name === 'dir') n.removeAttribute(a.name);
        });

        // Unwrap structurally meaningless tags
        const noStyle = !n.getAttribute('style') || n.getAttribute('style').trim() === '';
        const noClass = !n.getAttribute('class');
        const noHref  = !n.getAttribute('href');
        const canUnwrap = ['SPAN','FONT','H1','H2','H3','H4','H5','H6'].includes(tag)
                       || ((tag === 'B' || tag === 'STRONG') && !isBold);

        if (canUnwrap && noStyle && noClass && noHref) {
            const parent = n.parentNode;
            if (parent) {
                Array.from(n.childNodes).forEach(strip); // clean children first
                while (n.firstChild) parent.insertBefore(n.firstChild, n);
                parent.removeChild(n);
                return;
            }
        }

        Array.from(n.childNodes).forEach(strip);
    }

    Array.from(d.childNodes).forEach(strip);

    // Step 4: Convert content <div> → <p> (BEFORE safety net so spans inside divs are caught)
    // Also handle empty divs that represent blank lines in Google Docs
    Array.from(d.querySelectorAll('div')).reverse().forEach(el => {
        const hasBlockChild = Array.from(el.children).some(c =>
            ['DIV','P','TABLE','UL','OL','BLOCKQUOTE'].includes(c.tagName)
        );
        if (!hasBlockChild) {
            const p = document.createElement('p');
            p.innerHTML = el.innerHTML || '<br>';
            if (el.parentNode) el.parentNode.replaceChild(p, el);
        } else {
            // Unwrap wrapper divs that contain block children (Google Docs wrapper divs)
            const parent = el.parentNode;
            if (parent) {
                while (el.firstChild) parent.insertBefore(el.firstChild, el);
                parent.removeChild(el);
            }
        }
    });

    // Step 4b: Convert standalone <br><br> sequences into paragraph breaks.
    // Google Docs sometimes sends line breaks as <br> runs inside a single <p>.
    d.querySelectorAll('p').forEach(p => {
        const html = p.innerHTML;
        // If a <p> contains text + <br><br> + text, split it into separate paragraphs
        if (/<br\s*\/?>\s*<br\s*\/?>/.test(html)) {
            const parts = html.split(/<br\s*\/?>\s*<br\s*\/?>/gi);
            if (parts.length > 1) {
                const frag = document.createDocumentFragment();
                parts.forEach((part, i) => {
                    const np = document.createElement('p');
                    np.innerHTML = part.trim() || '<br>';
                    frag.appendChild(np);
                    // Add spacer between parts (not after last)
                    if (i < parts.length - 1) {
                        const spacer = document.createElement('p');
                        spacer.innerHTML = '<br>';
                        frag.appendChild(spacer);
                    }
                });
                p.parentNode.replaceChild(frag, p);
            }
        }
    });

    // Step 5: SAFETY NET — strip neutral spans from inside ALL <p> elements.
    // Runs after div→p so spans that were inside divs are now caught too.
    function unwrapNeutralSpans(root) {
        root.querySelectorAll('span, font').forEach(el => {
            const s = el.style;
            const isBold      = s.fontWeight === 'bold' || parseInt(s.fontWeight) >= 600;
            const isItalic    = s.fontStyle === 'italic';
            const isUnderline = s.textDecoration && s.textDecoration.includes('underline');
            if (!isBold && !isItalic && !isUnderline) {
                const parent = el.parentNode;
                if (parent) {
                    while (el.firstChild) parent.insertBefore(el.firstChild, el);
                    parent.removeChild(el);
                }
            }
        });
    }
    d.querySelectorAll('p').forEach(unwrapNeutralSpans);

    // Step 6: Apply canonical style to every <p>
    // Empty paragraphs (<p><br></p>) become full-height spacers — this preserves the
    // blank-line spacing the user set in Google Docs between paragraphs.
    const BODY = 'Margin:0;mso-line-height-rule:exactly;font-family:Arial,sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px;';

    d.querySelectorAll('p').forEach(el => {
        const text = el.textContent.replace(/[\u00a0\u200b\u200c\u200d\ufeff\u2060\u180e]/g, '').trim();
        // A paragraph is a spacer if it has NO visible text and NO images/tables.
        // This catches empty <p></p>, <p><br></p>, AND <p><span style="font-weight:bold"></span></p>
        // (Google Docs creates the last form — bold-styled empty spans inside empty paragraphs)
        const hasMedia = el.querySelector('img, table, iframe, video');
        const isSpacer = text === '' && !hasMedia;
        if (isSpacer) {
            // Replace all content with a single <br> so email clients render the line gap
            el.innerHTML = '<br>';
        }
        el.setAttribute('style', BODY);
    });

    // Step 7: Clean <li>
    d.querySelectorAll('li').forEach(el => {
        el.setAttribute('style', 'color:#333333;margin:0px 0px 15px;font-size:18px;line-height:27px;font-family:Arial,sans-serif;');
        el.querySelectorAll('span,font').forEach(sp => {
            const s = sp.style;
            const isBold = s.fontWeight === 'bold' || parseInt(s.fontWeight) >= 600;
            const isItalic = s.fontStyle === 'italic';
            const isUnderline = s.textDecoration && s.textDecoration.includes('underline');
            if (!isBold && !isItalic && !isUnderline) {
                while (sp.firstChild) sp.parentNode.insertBefore(sp.firstChild, sp);
                sp.parentNode && sp.parentNode.removeChild(sp);
            }
        });
    });

    // Step 8: Style <ul> and <ol> — ensure proper left padding so bullets
    // are never stuck to the left edge, matching the email template layout
    d.querySelectorAll('ul, ol').forEach(el => {
        el.setAttribute('style', 'font-family:Arial,sans-serif;padding:0px 0px 0px 40px;margin-top:15px;margin-bottom:15px;');
    });

    // Step 9: Style <a> links — ensure all pasted links have blue color
    // Fix THREE cases of color override:
    // 1) child spans inside <a> with color:#333333
    // 2) parent spans wrapping <a> with color:#333333
    // 3) the <a> tag itself
    d.querySelectorAll('a[href]').forEach(el => {
        el.setAttribute('style', 'color:#1a56c4;font-size:18px;font-family:Arial,sans-serif;text-decoration:underline;');
        el.setAttribute('target', '_blank');
        // Fix child spans/strongs that carry their own color
        el.querySelectorAll('span, strong, b, em, i').forEach(child => {
            let cs = child.getAttribute('style') || '';
            cs = cs.replace(/color\s*:\s*[^;]+;?/gi, '');
            cs = 'color:#1a56c4;' + cs;
            child.setAttribute('style', cs);
        });
        // Fix PARENT span that wraps the <a> — its color overrides the link in some email clients
        const parent = el.parentElement;
        if (parent && ['SPAN','STRONG','B','EM','I'].includes(parent.tagName)) {
            let ps = parent.getAttribute('style') || '';
            ps = ps.replace(/color\s*:\s*[^;]+;?/gi, '');
            ps = 'color:#1a56c4;' + ps;
            parent.setAttribute('style', ps);
        }
    });

    return d.innerHTML;
}




// ── PASTE HANDLER ────────────────────────────────────────────
editor.addEventListener('paste', e => {
    e.preventDefault();
    let html;
    if (e.clipboardData.types.includes('text/html')) {
        html = e.clipboardData.getData('text/html');
    } else {
        // Plain text: convert double newlines to paragraph breaks, single to <br>
        const text = e.clipboardData.getData('text/plain');
        const paragraphs = text.split(/\n\s*\n/);
        html = paragraphs.map(p => {
            const lines = p.split('\n').map(l => l.replace(/</g, '&lt;').replace(/>/g, '&gt;'));
            return '<p>' + lines.join('<br>') + '</p>';
        }).join('<p><br></p>');
    }
    const cleaned = cleanHTML(html);
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    range.deleteContents();

    // If we're inside a <p>, move cursor after it before inserting block-level content
    // so <p> elements from paste don't nest inside existing <p>
    const startNode = range.startContainer;
    const parentP = startNode.nodeType === 1
        ? startNode.closest('p')
        : startNode.parentElement && startNode.parentElement.closest('p');
    if (parentP && cleaned.includes('<p')) {
        const afterP = document.createRange();
        afterP.setStartAfter(parentP);
        afterP.collapse(true);
        sel.removeAllRanges();
        sel.addRange(afterP);
        afterP.insertNode(afterP.createContextualFragment(cleaned));
        afterP.collapse(false);
        sel.removeAllRanges(); sel.addRange(afterP);
    } else {
        range.insertNode(range.createContextualFragment(cleaned));
        range.collapse(false);
        sel.removeAllRanges(); sel.addRange(range);
    }
    sync(); toast('✅ VLOŽENÉ — FONT VYČISTENÝ');
});

// ── EXPORT ───────────────────────────────────────────────────
// Builds a clean, Mailchimp-compatible HTML export.
// Every <p> gets the full canonical inline style so LearnWorlds/Mailchimp
// cannot override font-size with its own default CSS.
function exportWithArial(html) {
    const d = document.createElement('div');
    d.innerHTML = html;

    // Remove editor artifacts
    d.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
    d.querySelectorAll('*').forEach(el => {
    });

    // Fix font-family on ALL elements via string replacement (avoids hex→rgb conversion)
    // Also strip font-size:13pt injected by old makeEditable() on structural elements
    d.querySelectorAll('*').forEach(el => {
        let sa = el.getAttribute('style');
        if (!sa) return;
        // Fix font-family
        if (sa.includes('font-family')) {
            sa = sa.replace(/font-family\s*:[^;"]*/g, 'font-family:Arial,sans-serif');
        }
        // Remove injected font-size:13pt from non-content elements (tables, trs, tds etc.)
        // These override the correct 18px on <p> elements via CSS cascade
        const tag = el.tagName;
        if (!['P','LI','SPAN','B','STRONG','I','EM','U','A'].includes(tag)) {
            sa = sa.replace(/font-size\s*:\s*13pt\s*;?/g, '');
            sa = sa.replace(/font-size\s*:\s*13\.\d+pt\s*;?/g, '');
        }
        el.setAttribute('style', sa);
    });

    // SPAN CLEANUP — two-pass approach:
    // Pass 1: Try to remove neutral spans entirely (no bold/italic/underline)
    // Convert NodeList to Array first so removals don't affect iteration
    Array.from(d.querySelectorAll('p span, p font')).forEach(el => {
        if (!el.parentNode) return; // already removed (was inside another span we removed)
        const s = el.style;
        const isBold      = s.fontWeight === 'bold' || parseInt(s.fontWeight) >= 600;
        const isItalic    = s.fontStyle === 'italic';
        const isUnderline = s.textDecoration && s.textDecoration.includes('underline');
        if (!isBold && !isItalic && !isUnderline) {
            const parent = el.parentNode;
            if (parent) {
                while (el.firstChild) parent.insertBefore(el.firstChild, el);
                parent.removeChild(el);
            }
        }
    });

    // Pass 2: For any spans that survived (Mailchimp may re-add them), explicitly
    // set font-size:18px so LearnWorlds can never render them at the wrong size.
    // Use string setAttribute to avoid JS style API converting hex to rgb.
    d.querySelectorAll('p span, p font').forEach(el => {
        const sa = el.getAttribute('style') || '';
        // Build clean style: keep only bold/italic/underline, add explicit 18px
        const s = el.style;
        const isBold      = s.fontWeight === 'bold' || parseInt(s.fontWeight) >= 600;
        const isItalic    = s.fontStyle === 'italic';
        const isUnderline = s.textDecoration && s.textDecoration.includes('underline');
        let newStyle = 'font-size:18px;font-family:Arial,sans-serif;line-height:27px;color:#333333;letter-spacing:0;';
        if (isBold)      newStyle += 'font-weight:bold;';
        if (isItalic)    newStyle += 'font-style:italic;';
        if (isUnderline) newStyle += 'text-decoration:underline;';
        el.setAttribute('style', newStyle);
    });

    // Ensure empty paragraphs have <br> so email clients render them as spacers
    // (catches empty <p><span style="..."></span></p> that the editor might create)
    d.querySelectorAll('p').forEach(el => {
        const text = el.textContent.replace(/[\u00a0\u200b\u200c\u200d\ufeff\u2060\u180e]/g, '').trim();
        const hasMedia = el.querySelector('img, table, iframe, video');
        if (text === '' && !hasMedia) {
            el.innerHTML = '<br>';
        }
    });

    // For every <p> element: write the FULL canonical Mailchimp-safe inline style.
    // This overwrites any partial/incorrect styles and ensures LearnWorlds respects 18px.
    // Footer paragraphs (font-size:11px) are detected and kept at 11px.
    d.querySelectorAll('p').forEach(el => {
        const existing = el.getAttribute('style') || '';

        // Detect footer paragraph (small copyright text)
        const isFooter = existing.includes('font-size:11px') || existing.includes('font-size: 11px')
                      || el.textContent.includes('Copyright') || el.textContent.includes('provozní zprávu');

        const color = existing.includes('color:#000000') || existing.includes('color: #000000') || existing.includes('color: rgb(0') ? '#000000' : '#333333';
        const size  = isFooter ? '11px' : '18px';
        const lh    = isFooter ? '16.5px' : '27px';

        // Preserve user-set margin-bottom/margin-top if present
        let marginExtra = '';
        const mbMatch = existing.match(/margin-bottom\s*:\s*([^;]+)/);
        const mtMatch = existing.match(/margin-top\s*:\s*([^;]+)/);
        if (mbMatch) marginExtra += 'mso-margin-bottom-alt:' + mbMatch[1].trim() + ';margin-bottom:' + mbMatch[1].trim() + ';';
        if (mtMatch) marginExtra += 'mso-margin-top-alt:' + mtMatch[1].trim() + ';margin-top:' + mtMatch[1].trim() + ';';

        // Build the full canonical style — same format as template paragraphs
        el.setAttribute('style',
            'Margin:0;mso-line-height-rule:exactly;font-family:Arial,sans-serif;' +
            'line-height:' + lh + ';letter-spacing:0;color:' + color + ';font-size:' + size + ';' + marginExtra
        );
    });

    // Same for <li> elements
    d.querySelectorAll('li').forEach(el => {
        el.setAttribute('style', 'color:#333333;margin:0px 0px 15px;font-size:18px;line-height:27px;font-family:Arial,sans-serif;');
        el.querySelectorAll('p').forEach(p => {
            p.setAttribute('style', 'Margin:0;font-family:Arial,sans-serif;line-height:27px;letter-spacing:0;color:#333333;font-size:18px;');
        });
    });

    // Style <ul> and <ol> — ensure proper left padding for bullet indentation
    d.querySelectorAll('ul, ol').forEach(el => {
        el.setAttribute('style', 'font-family:Arial,sans-serif;padding:0px 0px 0px 40px;margin-top:15px;margin-bottom:15px;');
    });

    // Style <a> links — ensure blue color and underline in exported HTML
    // Fix child spans, parent spans, and the <a> tag itself
    d.querySelectorAll('a[href]').forEach(el => {
        // Don't style footer links (tel:, mailto: with images) — only content links
        if (el.querySelector('img')) return;
        el.setAttribute('style', 'mso-line-height-rule:exactly;color:#1a56c4;font-size:18px;font-family:Arial,sans-serif;text-decoration:underline;');
        el.setAttribute('target', '_blank');
        // Fix child spans/strongs that carry their own color
        el.querySelectorAll('span, strong, b, em, i').forEach(child => {
            let cs = child.getAttribute('style') || '';
            cs = cs.replace(/color\s*:\s*[^;]+;?/gi, '');
            cs = 'color:#1a56c4;' + cs;
            child.setAttribute('style', cs);
        });
        // Fix PARENT span that wraps the <a>
        const parent = el.parentElement;
        if (parent && ['SPAN','STRONG','B','EM','I'].includes(parent.tagName)) {
            let ps = parent.getAttribute('style') || '';
            ps = ps.replace(/color\s*:\s*[^;]+;?/gi, '');
            ps = 'color:#1a56c4;' + ps;
            parent.setAttribute('style', ps);
        }
    });

    // Remove leading and trailing empty <p> inside each <td>
    // These are leftover placeholder paragraphs from the template that create
    // unwanted gaps when pasted content follows or precedes them.
    d.querySelectorAll('td').forEach(td => {
        function isEmptyP(el) {
            if (!el || el.tagName !== 'P') return false;
            const txt = el.textContent.replace(/[\u00a0\u200b]/g, '').trim();
            return txt === '' || el.innerHTML.trim() === '<br>';
        }
        // Remove leading empty paragraphs
        while (isEmptyP(td.firstElementChild)) td.removeChild(td.firstElementChild);
        // Remove trailing empty paragraphs
        while (isEmptyP(td.lastElementChild)) td.removeChild(td.lastElementChild);
    });

    return d.innerHTML;
}

// ── TOOLBAR ACTIONS ──────────────────────────────────────────
function fmt(cmd) { document.execCommand(cmd, false, null); sync(); }

function doLink() {
    // Save selection before prompt() steals focus
    const sel = window.getSelection();
    if (!sel.rangeCount || sel.isCollapsed) { alert('Najprv označ text.'); return; }
    const savedRange = sel.getRangeAt(0).cloneRange();

    const url = prompt('URL adresa (napr. https://laba.cz):');
    if (!url) return;

    // Restore selection after prompt
    sel.removeAllRanges();
    sel.addRange(savedRange);

    document.execCommand('createLink', false, url);

    // Find the newly created <a> and style it
    // After createLink, the selection is inside the new <a>
    const sel2 = window.getSelection();
    if (sel2.rangeCount) {
        let node = sel2.anchorNode;
        if (node.nodeType === 3) node = node.parentElement;
        const a = node.closest('a');
        if (a) {
            a.target = '_blank';
            a.setAttribute('style', 'color:#1a56c4;font-size:18px;font-family:Arial,sans-serif;text-decoration:underline;');
            // Also fix any child spans
            a.querySelectorAll('span, strong, b, em, i').forEach(child => {
                let cs = child.getAttribute('style') || '';
                cs = cs.replace(/color\s*:\s*[^;]+;?/gi, '');
                cs = 'color:#1a56c4;' + cs;
                child.setAttribute('style', cs);
            });
        }
    }
    sync();
}

function doUnlink() {
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    // Find the <a> element(s) in the selection
    let node = sel.anchorNode;
    if (node.nodeType === 3) node = node.parentElement;
    const a = node.closest('a');
    if (a) {
        // Remove link: unwrap the <a>, reset styles on all children
        const parent = a.parentNode;
        // Reset color/underline on any child elements
        a.querySelectorAll('span, strong, b, em, i').forEach(child => {
            let cs = child.getAttribute('style') || '';
            cs = cs.replace(/color\s*:\s*[^;]+;?/gi, '').replace(/text-decoration\s*:\s*[^;]+;?/gi, '');
            cs = 'color:#333333;' + cs;
            child.setAttribute('style', cs);
        });
        // Also fix parent wrapper span if present
        if (parent && ['SPAN','STRONG','B','EM','I'].includes(parent.tagName)) {
            let ps = parent.getAttribute('style') || '';
            ps = ps.replace(/color\s*:\s*[^;]+;?/gi, '').replace(/text-decoration\s*:\s*[^;]+;?/gi, '');
            ps = 'color:#333333;' + ps;
            parent.setAttribute('style', ps);
        }
        // If <a> has no child elements (just text), wrap text in a clean span
        if (!a.querySelector('span, strong, b, em, i')) {
            const cleanSpan = document.createElement('span');
            cleanSpan.style.color = '#333333';
            while (a.firstChild) cleanSpan.appendChild(a.firstChild);
            parent.insertBefore(cleanSpan, a);
        } else {
            // Move children out of <a> into parent
            while (a.firstChild) parent.insertBefore(a.firstChild, a);
        }
        parent.removeChild(a);
    } else {
        // Fallback: use execCommand
        document.execCommand('unlink', false, null);
    }
    sync();
    toast('✂ LINK ODSTRÁNENÝ');
}

function cleanSel() {
    const sel = window.getSelection();
    if (!sel.rangeCount || sel.isCollapsed) { alert('Najprv označ text.'); return; }
    const range = sel.getRangeAt(0);
    const frag = range.extractContents();
    const tmp = document.createElement('div');
    tmp.appendChild(frag);
    Array.from(tmp.childNodes).forEach(cleanNode);
    const cf = document.createDocumentFragment();
    while (tmp.firstChild) cf.appendChild(tmp.firstChild);
    range.insertNode(cf);
    range.collapse(false);
    sel.removeAllRanges(); sel.addRange(range);
    sync(); toast('🧹 FORMÁTOVANIE VYČISTENÉ');
}

// ── SPACING CONTROLS ─────────────────────────────────────────
// Apply line-height to every block element in the current selection
function applyLineHeight(val) {
    if (!val) return;
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);

    // Find all block-level elements touched by the selection
    const container = range.commonAncestorContainer;
    const root = container.nodeType === 1 ? container : container.parentElement;
    const blocks = root.querySelectorAll('p, div, li, td');

    let applied = 0;
    blocks.forEach(el => {
        if (sel.containsNode(el, true)) {
            el.style.lineHeight = val;
            // Also update the mso version for Outlook
            const sa = el.getAttribute('style') || '';
            if (sa.includes('mso-line-height-rule')) {
                el.setAttribute('style', sa.replace(/line-height:[^;]*/g, 'line-height:' + (parseFloat(val) * 27).toFixed(0) + 'px'));
            }
            applied++;
        }
    });

    // If nothing found (collapsed or single paragraph), apply to current paragraph
    if (applied === 0) {
        const p = range.startContainer.nodeType === 1
            ? range.startContainer
            : range.startContainer.parentElement.closest('p, div, li, td');
        if (p) p.style.lineHeight = val;
    }

    // Reset dropdown
    document.getElementById('lh-sel').value = '';
    sync();
    toast('↕ RIADKOVANIE ' + val);
}

// Apply margin-bottom to block elements in the selection
function applyMarginBottom(val) {
    if (!val) return;
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);

    const container = range.commonAncestorContainer;
    const root = container.nodeType === 1 ? container : container.parentElement;
    const blocks = root.querySelectorAll('p, div, li');

    let applied = 0;
    blocks.forEach(el => {
        if (sel.containsNode(el, true)) {
            el.style.marginBottom = val;
            el.style.setProperty('mso-margin-bottom-alt', val);
            applied++;
        }
    });

    if (applied === 0) {
        const p = range.startContainer.nodeType === 1
            ? range.startContainer
            : range.startContainer.parentElement.closest('p, div, li');
        if (p) { p.style.marginBottom = val; p.style.setProperty('mso-margin-bottom-alt', val); }
    }

    document.getElementById('mb-sel').value = '';
    sync();
    toast('⬇ MEDZERA ' + val);
}

// ── MODAL ────────────────────────────────────────────────────
function openModal() {
    document.getElementById('modal-area').value = '';
    document.getElementById('modal-chars').innerText = '';
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('modal-area').focus();
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function applyModal() {
    const raw = document.getElementById('modal-area').value.trim();
    if (!raw) { alert('Vlož HTML kód!'); return; }
    editor.innerHTML = raw;
    makeEditable();
    sync(); closeModal();
    toast('✅ HTML NAČÍTANÉ');
}
document.getElementById('modal-area').addEventListener('input', function() {
    const n = this.value.length;
    document.getElementById('modal-chars').innerText = n ? n.toLocaleString() + ' znakov' : '';
});
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

// ── TEMPLATE LOADING ─────────────────────────────────────────
function makeEditable() {
    // Only set contenteditable — do NOT touch el.style as it normalizes
    // the entire style attribute (hex→rgb, loses mso-* properties)
    editor.querySelectorAll('*').forEach(el => {
        el.setAttribute('contenteditable', 'true');
    });
}

function loadTpl(idx, el) {
    editor.innerHTML = TPLS[idx].html;
    makeEditable();
    document.getElementById('tpl-name-display').innerText = TPLS[idx].name;
    document.querySelectorAll('.tpl-item').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    sync();
}

function init() {
    TPLS.forEach((t, i) => {
        const d = document.createElement('div');
        d.className = 'tpl-item';
        d.innerText = t.name;
        d.onclick = () => loadTpl(i, d);
        document.getElementById('tpl-list').appendChild(d);
    });
}

// ── SYNC + TOAST ─────────────────────────────────────────────
function sync() { htmlOut.value = editor.innerHTML; }
editor.addEventListener('input', sync);

let toastT;
function toast(msg) {
    const el = document.getElementById('toast');
    el.innerText = msg; el.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => el.classList.remove('show'), 2400);
}

// ── FILE IMPORT (Google Docs HTML) ───────────────────────────
function triggerImport() {
    document.getElementById('file-import').click();
}

function handleFileImport(input) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    if (!file.name.match(/\.html?$/i)) {
        alert('Vyber .html súbor (Google Docs → Download → Web Page)');
        return;
    }
    const reader = new FileReader();
    reader.onload = e => {
        processImportedHTML(e.target.result, file.name);
    };
    reader.readAsText(file);
    input.value = ''; // reset so same file can be re-imported
}

function processImportedHTML(rawHtml, fileName) {
    // Extract body content from full HTML document
    const parser = new DOMParser();
    const doc = parser.parseFromString(rawHtml, 'text/html');
    const body = doc.body;
    if (!body || !body.innerHTML.trim()) {
        alert('Súbor neobsahuje žiadny obsah.');
        return;
    }

    // Step 1: Resolve CSS class styles → inline styles
    // Google Docs HTML export uses <style> classes like .c1{font-weight:700}
    // We must convert these to inline styles BEFORE extracting body content,
    // otherwise bold/italic/underline info is lost when we discard the <head>.
    const styleMap = {};
    doc.querySelectorAll('style').forEach(styleEl => {
        const text = styleEl.textContent;
        const ruleRegex = /\.([a-zA-Z0-9_-]+)\s*\{([^}]*)\}/g;
        let match;
        while ((match = ruleRegex.exec(text)) !== null) {
            styleMap[match[1]] = match[2];
        }
    });

    body.querySelectorAll('*').forEach(el => {
        if (!el.classList.length) return;
        Array.from(el.classList).forEach(cls => {
            const rules = styleMap[cls];
            if (!rules) return;
            // Formatting
            if (/font-weight\s*:\s*(bold|[6-9]\d{2}|1000)/i.test(rules)) el.style.fontWeight = 'bold';
            if (/font-style\s*:\s*italic/i.test(rules)) el.style.fontStyle = 'italic';
            if (/text-decoration\s*:[^;]*underline/i.test(rules)) el.style.textDecoration = 'underline';
            // Spacing — Google Docs uses height:Xpt on empty paragraphs
            // and margin-bottom on regular paragraphs for spacing
            const mbMatch = rules.match(/margin-bottom\s*:\s*([^;]+)/i);
            if (mbMatch) el.style.marginBottom = mbMatch[1].trim();
            const mtMatch = rules.match(/margin-top\s*:\s*([^;]+)/i);
            if (mtMatch) el.style.marginTop = mtMatch[1].trim();
        });
    });

    // Step 1b: Convert paragraph spacing into explicit empty-line spacers.
    // Google Docs uses margin-bottom/margin-top on <p> for spacing between sections.
    // Email templates use empty <p><br></p> instead. Convert one to the other.
    // Also: ensure truly empty <p> elements (Google Docs empty lines) survive.
    Array.from(body.querySelectorAll('p')).forEach(p => {
        // If a paragraph has significant margin-bottom (> 10pt/14px), insert a spacer after it
        const mb = parseFloat(p.style.marginBottom) || 0;
        // Google Docs uses pt units — 12pt = 16px is typical "space after paragraph"
        if (mb > 10) {
            const spacer = doc.createElement('p');
            spacer.innerHTML = '<br>';
            p.parentNode.insertBefore(spacer, p.nextSibling);
            p.style.marginBottom = '0';
        }

        // Ensure empty paragraphs have <br> so they render as visible spacers
        const text = p.textContent.replace(/[\u00a0\u200b\u200c\u200d\ufeff]/g, '').trim();
        if (text === '' && p.innerHTML.trim() === '') {
            p.innerHTML = '<br>';
        }
    });

    // Step 1c: Convert standalone <br> tags between paragraphs into <p><br></p> spacers
    // (ChatGPT → Google Docs paste sometimes creates these)
    Array.from(body.childNodes).forEach(node => {
        if (node.nodeType === 1 && node.tagName === 'BR') {
            const spacer = doc.createElement('p');
            spacer.innerHTML = '<br>';
            node.parentNode.replaceChild(spacer, node);
        }
    });

    // Step 2: Remove style tags from body (no longer needed)
    body.querySelectorAll('style').forEach(s => s.remove());

    // Step 3: Get body content and clean it
    const cleaned = cleanHTML(body.innerHTML);

    // Step 4: Find the body content <td> in the editor
    const bodyTd = findBodyTd();
    if (!bodyTd) {
        alert('Najprv vyber šablónu v ľavom paneli, potom importuj.');
        return;
    }

    // Replace the body TD content with cleaned import
    bodyTd.innerHTML = cleaned;
    makeEditable();
    sync();
    toast('📂 IMPORTOVANÉ: ' + fileName);
}

function findBodyTd() {
    // Find the <td> with the most <p> children among white-bg TDs = body content area
    const tds = editor.querySelectorAll('td[bgcolor="#ffffff"]');
    let best = null;
    let maxPs = 0;
    tds.forEach(td => {
        const pCount = td.querySelectorAll('p').length;
        if (pCount > maxPs) {
            maxPs = pCount;
            best = td;
        }
    });
    return best;
}

// ── DRAG & DROP ─────────────────────────────────────────────
const dropOverlay = document.getElementById('drop-overlay');
let dragCounter = 0;

window.addEventListener('dragenter', e => {
    e.preventDefault();
    // Only show overlay for file drops (not text drags inside editor)
    if (e.dataTransfer && e.dataTransfer.types.includes('Files')) {
        dragCounter++;
        dropOverlay.classList.add('active');
    }
});

window.addEventListener('dragleave', e => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) {
        dragCounter = 0;
        dropOverlay.classList.remove('active');
    }
});

window.addEventListener('dragover', e => {
    e.preventDefault(); // required to allow drop
});

window.addEventListener('drop', e => {
    e.preventDefault();
    dragCounter = 0;
    dropOverlay.classList.remove('active');

    const files = e.dataTransfer && e.dataTransfer.files;
    if (!files || !files.length) return;

    const file = files[0];
    if (!file.name.match(/\.html?$/i)) {
        toast('⚠️ Vyber .html súbor');
        return;
    }

    const reader = new FileReader();
    reader.onload = ev => {
        processImportedHTML(ev.target.result, file.name);
    };
    reader.readAsText(file);
});

init();
</script>
