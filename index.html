<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>LABA / SKVOT Email Editor PRO</title>
    <style>
        :root { --bg: #1e1e1e; --panel: #2d2d2d; --accent-arial: #4ade80; --accent-helvetica: #3b82f6; --text: #d4d4d4; --laba-blue: #0051ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 280px; background: var(--panel); border-right: 1px solid #444; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #333; font-weight: bold; border-bottom: 1px solid #444; text-align: center; }
        .template-list { flex: 1; overflow-y: auto; padding: 10px; }
        .template-item { padding: 10px; background: #3d3d3d; margin-bottom: 5px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .template-item:hover { background: #4d4d4d; }
        .template-item.active { background: #323e52; border-left: 4px solid var(--laba-blue); }

        /* Main View */
        #main-view { flex: 1; display: flex; flex-direction: column; }
        .toolbar { padding: 10px; background: #333; border-bottom: 1px solid #444; display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
        
        /* Editor Area */
       #visual-container { flex: 1; background-color: #F0F2F5; overflow-y: auto; padding: 40px; display: flex; justify-content: center; align-items: flex-start; }
       #editor-surface { width: 600px; min-height: 800px; background: white; box-shadow: 0 5px 20px rgba(0,0,0,0.2); outline: none; color: #000; padding: 0; margin-top: 20px; }

        /* Code View */
        #code-container { width: 350px; background: var(--panel); border-left: 1px solid #444; display: flex; flex-direction: column; }
        textarea { flex: 1; background: #161616; color: #85d7ff; padding: 10px; font-family: monospace; font-size: 10px; border: none; resize: none; }

        /* Buttons */
        .btn-tool { background: #444; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .btn-tool:hover { background: #555; }
        .btn-export { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .btn-arial { background: var(--accent-arial); color: #000; }
        .btn-helvetica { background: var(--accent-helvetica); color: #fff; }
        .separator { width: 1px; height: 20px; background: #555; margin: 0 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">ŠABLÓNY</div>
    <div class="template-list" id="tpl-list"></div>
</div>

<div id="main-view">
    <div class="toolbar">
        <button class="btn-tool" onclick="exec('bold')" title="Tučné"><b>B</b></button>
        <button class="btn-tool" onclick="exec('underline')" title="Podčiarknuté"><u>U</u></button>
        <button class="btn-tool" onclick="addLink()" title="Vložiť link">🔗 Link</button>
        <button class="btn-tool" onclick="exec('unlink')" title="Zrušiť link">🚫</button>
        
        <div class="separator"></div>
        
        <button class="btn-export btn-arial" onclick="exportMail('Arial, sans-serif')">EXPORT ARIAL</button>
        <button class="btn-export btn-helvetica" onclick="exportMail('Helvetica, Arial, sans-serif')">EXPORT HELVETICA</button>
        
        <span id="active-tpl-name" style="margin-left: auto; font-size: 11px; color: #888;"></span>
    </div>
    
    <div id="visual-container">
        <div id="editor-surface" contenteditable="true" spellcheck="false"></div>
    </div>
</div>

<div id="code-container">
